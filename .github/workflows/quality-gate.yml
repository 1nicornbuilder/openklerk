name: Quality Gate
on:
  pull_request:
    paths:
      - 'openclerc/filers/**'
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - name: Run quality checks
        run: |
          for f in $(git diff --name-only origin/main... | grep 'openclerc/filers/' | sed 's|openclerc/filers/||' | sed 's|\.py||' | grep -v '__init__' | grep -v '_template'); do
            echo "Checking: $f"
            openclerc check --filer "$f"
          done
